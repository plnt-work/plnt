# fly.toml — plnt playground API on Fly.io
#
# Deploy:
#   fly auth login                             # once
#   fly launch --no-deploy --copy-config       # creates the app; edit region if needed
#   fly secrets set UPSTREAM_API_KEY=sk-...    # OpenAI-compat upstream key (never commit this)
#   fly deploy
#   fly certs add playground.plnt.work         # then add the CNAME it prints at your DNS
#
# The container image is built from docker/playground-api.Dockerfile.
# Everything below is source-controlled; secrets live only in `fly secrets`.

app = "plnt-playground"
primary_region = "iad"

[build]
  dockerfile = "docker/playground-api.Dockerfile"

[env]
  # Configured origins for browser CORS (comma-separated).
  PLNT_PLAYGROUND_CORS_ORIGINS = "https://plnt.work,https://play.plnt.work,https://playground.plnt.work"

  # Default demo registry — two mock models so a fresh `fly deploy` returns
  # something usable without secrets or upstream dependencies. Replace with
  # real backends (any OpenAI-compat upstream: vLLM, TGI, SGLang, or a hosted
  # provider) once you have `UPSTREAM_API_KEY` set via `fly secrets`.
  PLNT_PLAYGROUND_MODELS = """
  [
    {"id":"plnt-mock-7b","backend":"mock","runtime":"mock"},
    {"id":"plnt-mock-70b","backend":"mock","runtime":"mock"}
  ]
  """

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
