apiVersion: v1
kind: Service
metadata:
  name: {{ include "vllm-runtime.fullname" . }}
  labels:
    {{- include "vllm-runtime.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "vllm-runtime.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (include "vllm-runtime.fullname" .) .Values.serviceAccount.name }}
  labels:
    {{- include "vllm-runtime.labels" . | nindent 4 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vllm-runtime.fullname" . }}-weights
  labels:
    {{- include "vllm-runtime.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 200Gi
